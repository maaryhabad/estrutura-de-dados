name: Python Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Executar Testes Unitários
      run: |
        python3 -m unittest discover -v -t . -s questao1_hospital -p "tests_*.py"
        python3 -m unittest discover -v -t . -s questao2_hash -p "tests_*.py"